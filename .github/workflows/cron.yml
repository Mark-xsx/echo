name: Echo Cron - 发送到期邮件

on:
  schedule:
    - cron: '*/30 * * * *'   # 每30分钟执行一次
  workflow_dispatch:          # 允许手动触发

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call backend cron endpoint
        run: |
          curl -X POST "${{ secrets.BACKEND_URL }}/cron/send-emails?token=${{ secrets.CRON_SECRET }}"